commands:
  help:
    description: "Я обязательно помогу тебе, друг"
  privacy:
    description: "политика по работе с персональными данными"
  grow:
    description: "Вырасти пиписю!"
    result: "Твоя пися %{event} на <b>%{incr}</b> см и теперь её длина составляет <b>%{length} см</b>."
    direction:
      grown: "выросла"
      shrunk: "скукожилась"
    position: "Ты занимаешь <b>%{pos}</b> место в топе."
    tomorrow: "Ты уже играл с пиписей сегодня."
  top:
    description: "Узнай рейтинг самых больших волын в чате"
    title: "Топ самых больших пиписек:"
    line: "%{n}|<b>%{name}</b> — <b>%{length}</b> см"
    ending: "<i>[+] значит, что гровер не растил ещё свою пипиську сегодня.</i>"
    empty: "Никто пока не участвует в игре :("
  dod:
    description: "Выбор Писюна Дня"
    result: "Пам-пам-пам! Писюн Дня — <b><a href=\"tg://user?id=%{uid}\">%{name}</a></b>!\n\nЕго пиписик вырос на <b>%{growth} см</b> и теперь длиной <b>%{length}</b> см."
    position: "Он занимает <b>%{pos}</b> место в топе."
    already_chosen: "Писюн Дня уже был выбран на сегодня! Это <b>%{name}</b>."
    no_candidates: "Не из кого выбирать: в этом чате ещё никто не участвует в игре 😢"
  pvp:
    description: "Сражайся с пипирками друзей!"
    results:
      start: "<b>%{name}</b> бросил чату вызов со ставкой <b>%{bet} см</b>!"
      finish: "Победитель — <b>%{winner_name}</b>! Его пипирик теперь равен <b>%{winner_length} см</b>, а проигравшего — <b>%{loser_length} см</b>.\nСтавка была <b>%{bet} см</b>."
      position:
        winner: "<b>%{name}</b> занимает <b>%{pos}</b> место в топе."
        loser: "<b>%{name}</b> занимает <b>%{pos}</b> место в топе."
      stats:
        text: "Процент выигрышей <b>победителя</b> — <b>%{winner_win_rate}</b>.\nЕго текущая серия побед — <b>%{winner_win_streak}</b>, максимальная — <b>%{winner_win_streak_max}</b>.\nПроцент выигрышей <b>проигравшего</b> — <b>%{loser_win_rate}</b>."
        lost_win_streak: "Прервалась серия из <b>%{lost_win_streak}</b> побед подряд."
      withheld: "<b>%{payout} см</b> было удержано с победителя для погашения задолженности."
    button: "Атаковать!"
    errors:
      no_args: "Вызови команду с числом сантиметров, которые готов поставить."
      not_enough:
        initiator: "Пфф. Стрючок инициатора слишком короткий для такой ставки!"
        acceptor: "Твоя волына слишком коротка 😣"
      same_person: "Нельзя биться с самим собой!"
      battle_already_in_progress: "Сражение уже началось! Сообщение обновится через мгновение…"
  stats:
    description: "Статистика"
    length: "Длина: <b>%{length}</b>\nПозиция в топе: <b>%{pos}</b>"
    pvp: "Процент выигрышей: <b>%{win_rate}</b>.\nСыгранных боёв: <b>%{battles}</b>.\nПобед: <b>%{wins}</b>.\nМаксимум побед подряд: <b>%{win_streak}</b>.\nВыиграно: <b>%{acquired} см</b>.\nПроиграно: <b>%{lost} см</b>."
    notice: "Статистика начала собираться со 2 июля 2024."
    personal: "<i>Персональная статистика:</i>\n— Количество чатов: <b>%{chats}</b>.\n— Максимальная длина: <b>%{max_length}</b>.\n— Сумма писюнов среди всех чатов: <b>%{total_length}</b>."
  loan:
    description: "Минус? Возьми кредит!"
    debt: "Осталось выплатить <b>%{debt} см</b>"
    confirmation:
      text: "Твоя пропасть будет обнулена, но размер каждого прироста снизится на <b>%{payout_percentage}</b> до выплаты всех <b>%{debt} см</b>."
      buttons:
        agree: "Согласен"
        disagree: "Я пас"
    callback:
      success: "Микрозайм успешно предоставлен!"
      refused: "Пациент отказался от смены пола в кредит."
      payout_ratio_changed: "С момента подачи заявления ставка выплаты изменилась. Пожалуйста, вызовите команду ещё раз."
    errors:
      positive_length: "Операции по увеличению братюни в кредит не проводим! Социальная программа действует только чтобы помочь выбраться из бездонной глубины!"
  import:
    description: "Импорт писюнов из других ботов"
    result:
      titles:
        imported: "Следующие пользователи были импортированы:"
        already_present: "Следующие пользователи уже были импортированы ранее:"
        not_found: "Следующие пользователи ещё не в игре:"
      line:
        imported: "➖ <b>%{name}</b> (<i>%{length}</i> см)"
        already_present: "➖ <b>%{name}</b> (<i>%{length}</i> см)"
        not_found: "➖ <b>%{name}</b>"
    errors:
      not_admin: "Команда предназначена для использования только администраторами чата!"
      not_reply: "Вы должны ответить на не пересланное сообщение от любого из оригинальных ботов: %{origin_bots}"
      invalid_lines:
        template: "Не удалось разобрать сообщение 🤔\nСледующие строки невалидны:\n%{invalid_lines}\n\nПодписывайтесь на @kozaloru, чтобы узнать, когда выйдет исправление!"
        line: "➖ <b>%{line}</b>"
  promo:
    description: "Активировать промокод"
    request: "Введи промокод:"
    success:
      template: "Промокод успешно активирован! %{ending}"
      singular: "Твой писюн вырос на <b>%{growth}</b> см в одном чате."
      plural: "Твой писюн вырос на <b>%{growth}</b> см в <b>%{affected_chats}</b> %{word_chats}."
    errors:
      no_activations_left: "Мне очень жаль, но кажется, что либо этого промокода никогда не существовало, либо он истёк, либо все активации уже были использованы 😞"
      already_activated: "Кажется, ты уже использовал данный промокод ранее 🤨"
      no_dicks: "Кажется, ты ещё не начал растить ни одного писюна? 🤔 Сейчас самое время добавить меня в какой-либо чат и выполнить команду <code>/grow</code>!"
    inline:
      switch_button: "Активировать промокод \"%{code}\"…"
  ench:
    description: "Точи вагину, раз члена нет!"
    success: "🔧 Тынц-тынц! Заточка удалась (шанс был <b>%{chance}%</b>) — твоя мохнатка сверкает на <b>+%{level}</b>!"
    success_bless: "✨ Блесс лёг как надо (шанс был <b>%{chance}%</b>)! Мохнатка сияет божественным светом на <b>+%{level}</b>. Осталось блессов: <b>%{blesses}</b>."
    fail: "💥 ХРЯСЬ! Неудача (шанс был <b>%{chance}%</b>)... Заточка осыпалась в труху, мохнатка снова девственно тупая: <b>+0</b>."
    fail_bless: "🛡 Неудача (шанс был <b>%{chance}%</b>), но блесс уберёг твою прелесть! Заточка осталась на <b>+%{level}</b>. Осталось блессов: <b>%{blesses}</b>."
    attempts_left: "Точилок на сегодня осталось: <b>%{left}</b>."
    errors:
      no_vagina: "Куда полез?! С прибором в <b>%{length} см</b> точить нечего — вагина полагается только тем, кто на нуле или в минусе."
      no_attempts: "Точилки на сегодня закончились, шлифовщица."
      no_blesses: "Блесс-точек нет! Дождись милости от /bless или отбей их в /sex."
  bless:
    description: "Избрание Вагины Дня с раздачей блессов"
    result: "🙏 Небеса разверзлись! Вагина Дня — <b><a href=\"tg://user?id=%{uid}\">%{name}</a></b>! Ей ниспослано <b>%{amount}</b> блесс-точек. Точи с умом."
    already_chosen: "Вагину Дня сегодня уже избирали! Небеса устали."
    no_candidates: "В этом чате нет ни одной вагины — все при членах. Благословлять некого 🤷"
  sex:
    description: "Вагиной на член! Отвечает достойный."
    start: "🍑 <b>%{name}</b> раздвигает ноги: вагина, заточенная на <b>+%{sharpness}</b>, ищет смельчака!\n\nОткликнуться может любой обладатель члена от <b>%{sharpness} см</b>. Шансы 50/50: или откусит, или затупится."
    button: "Присунуть!"
    vagina_wins: "🦷 ХРУМ! Вагина <b><a href=\"tg://user?id=%{initiator_uid}\">%{initiator_name}</a></b> откусила у <b><a href=\"tg://user?id=%{defender_uid}\">%{defender_name}</a></b> ровно <b>%{sharpness} см</b>!\n\nТеперь у неё свой собственный член в <b>%{sharpness} см</b>, а у пострадавшего осталось <b>%{defender_length} см</b>. Зубастая попалась."
    dick_wins: "🍆 Член <b><a href=\"tg://user?id=%{defender_uid}\">%{defender_name}</a></b> устоял и вышел победителем!\n\nВагина <b><a href=\"tg://user?id=%{initiator_uid}\">%{initiator_name}</a></b> затупилась в <b>+0</b>, а победитель получает <b>%{blesses}</b> блесс-точек на чёрный день."
    errors:
      no_vagina: "У тебя член, а не вагина. Тебе в /pvp, боец."
      not_sharpened: "Твоя вагина не заточена! Сначала /ench, потом романтика."
      same_person: "Сам с собой? Это в другой чат."
      too_short: "Твой отросток короче заточки этой вагины. Не позорься 😬"
      expired: "Поезд ушёл: эта вагина уже не та (или вообще уже член)."
  gnomes:
    raid: "🌚 Этой ночью в чат прокрались <b>гномы-хуекрады</b> и отпилили у <b><a href=\"tg://user?id=%{uid}\">%{name}</a></b> целых <b>%{stolen} см</b>!\n\nТеперь у бедолаги <b>%{length} см</b>. Спите чутко, длинномеры…"
inline:
  results:
    text: "Так как я не могу определить чат из inline-запроса, нажми на кнопку ниже, чтобы получить результат."
    button: "Кликни!"
    titles:
      grow: "Увеличь свою пиписю!"
      top: "Топ самых огромных писюнов"
      dick_of_day: "Избрание Писюна Дня"
      pvp: "Брось вызов другим гроверам со ставкой %{bet} см!"
      stats: "Статистика побед"
      loan: "Минус? Возьми кредит!"
  callback:
    errors:
      another_user: "Сообщение было отправлено другим человеком."
      invalid_data: "Возможно, это сообщение было отправлено через более старую версию бота. Попробуй послать его ещё раз."
      unknown_data: "Неизвестная команда"
      no_data: "Что-то пошло не так нет…"
titles:
  greeting: "Приветствую"
  time_till_next_day:
    none: " Возвращайся завтра!"
    some: "\n\nСледующая попытка через <b>%{hours}</b> ч. <b>%{minutes}</b> мин."
  perks:
    top_line: "На результат повлияли следующие перки"
    help-pussies: "глубокая нора"
    loan-payout: "микрозаймер"
errors:
  not_group_chat: "Бот выполняет свою миссию только в групповых чатах!"
  feature_disabled: "Данная функция пока временно отключена."
